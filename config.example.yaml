output:
  format: "markdown"
  language: "Chinese"
  min_score_to_keep: 8 # 任一维度达到 8 分即保留
  hours_back: 48 # 过去48小时
  model: "deepseek-chat" # 使用 DeepSeek 进行核心推理

delivery:
  enabled: true
  sender_email: "your_sender@example.com" # 填写你的发送邮箱地址
  recipient_email: "your_recipient@example.com"      # 接收报告的邮箱
  smtp_server: "smtp.mail.me.com"
  smtp_port: 587
