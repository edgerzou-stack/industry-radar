industries:
  - name: 泛科技与前沿创新
    keywords: ["AI", "Semiconductor", "Robotics", "Quantum", "SaaS", "Big Tech", "Hardware", "Startup"]

importance_criteria: |
  请对这篇科技产业新闻进行“双维打分”（硬核创新 vs 流量舆情）：
  
  维度一：硬核创新分 (Innovation Score，0-10分)
  衡量底层技术、长远商业价值和颠覆性。
  - 8-10分：核心技术的重大跃进（如顶级AI模型、芯片架构流片）、证明了全新的科技盈利模式、重大的产业并购或顶级科学家跳槽。
  - 【强制审查】：极度厌恶缺乏数据支撑的公关用词。如果文章充满夸张的形容词（如“革命性”、“颠覆性”、“最强”），但没有提供具体的基准测试数据、财务指标、融资金额或开源地址等“硬核事实”，请直接将其创新分扣至 4 分以下！
  
  维度二：流量与舆情分 (Traffic & Hype Score，0-10分)
  衡量消费者狂热度、社交媒体热度和资本短期情绪。
  - 8-10分：巨头间的抓马(Drama)事件、全网热议的爆款数码产品发布、现象级但可能短暂的流量风口、引发大众广泛讨论的政策（如针对某APP的封杀）、【资本异动】顶级科技巨头（如英伟达、美光、微软、苹果等）发布远超预期的财报或引发股市剧烈震动的商业数据。

