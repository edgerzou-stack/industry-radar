industries:
  - name: 泛科技与核心算力
    keywords: ["AI", "Semiconductor", "Robotics", "Quantum", "SaaS", "Big Tech", "Hardware", "Startup"]
  - name: 医药与生物科技
    keywords: ["Biotech", "Pharma", "CRISPR", "Genomics", "Synthetic Biology", "医药", "生物", "基因", "创新药"]
  - name: 新能源与气候科技
    keywords: ["Clean Energy", "EV", "Battery", "Solar", "Fusion", "Material", "新能源", "光伏", "固态电池", "新材料", "核聚变"]
  - name: 航空航天与深空探索
    keywords: ["Aerospace", "SpaceX", "Satellite", "Space", "Aviation", "航天", "星链", "商业航天", "卫星"]
  - name: 脑机接口与下一代交互
    keywords: ["Brain-Computer Interface", "BCI", "Neuralink", "AR", "VR", "Spatial Computing", "脑机接口", "空间计算"]
importance_criteria: |
  请对这篇科技产业新闻进行“双维打分”（硬核创新 vs 流量舆情）：
  
  维度一：硬核创新分 (Innovation Score，0-10分)
  衡量底层技术、长远商业价值和颠覆性。
  - 8-10分：核心技术的重大跃进。
  - 【强制审查】：如果文章没有具体事实，仅为公关文，扣分。

  维度二：流量与舆情分 (Traffic & Hype Score，0-10分)
  衡量消费者狂热度、社交媒体热度、以及对产业链的实际影响。
  - 8-10分：现象级流量风口。
  - 【强制审查】：纯二级市场交易信息扣分。

trusted_sources:
  # 白名单媒体，若在此列表内，打分将在代码中自动享受硬核分数加权 (+1.0)
  - "Nature"
  - "Science"

